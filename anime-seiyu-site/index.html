<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>声優豪華アニメチェック</title>

<!-- CSS：カード風デザイン -->
<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  max-width: 600px;
  margin: auto;
  background-color: #fdf6e3;
}

h1 {
  color: #d33682;
  text-align: center;
}

input, button {
  padding: 10px;
  font-size: 16px;
  margin-bottom: 15px;
  width: 100%;
  box-sizing: border-box;
}

button {
  background-color: #268bd2;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background-color: #1b6ca8;
}

ul {
  list-style-type: none;
  padding: 0;
}

li.character-card {
  background-color: #eee;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

li.character-card ul {
  background-color: #fdf6e3;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}

li.character-card ul li {
  border-left: 3px solid #268bd2;
  padding-left: 5px;
  margin-bottom: 5px;
}
</style>
</head>

<body>
<h1>声優豪華アニメチェック</h1>
<p>アニメの声優一覧と代表キャラクターが一目でわかるサイト</p>

<input type="text" placeholder="アニメ名を入力">
<button>検索</button>

<ul></ul>

<script>
const button = document.querySelector("button");
const input = document.querySelector("input");
const ul = document.querySelector("ul");

button.addEventListener("click", async () => {
  const name = input.value.trim();
  if (!name) return;

  const query = `
    query ($search: String) {
      Page(perPage: 1) {
        media(type: ANIME, search: $search) {
          id
          title { romaji }
          characters(sort: ROLE) {
            edges {
              node { name { full } }
              voiceActors(language: JAPANESE) { name { full } }
            }
          }
        }
      }
    }
  `;
  const variables = { search: name };

  try {
    // Vercelプロキシを使用してCORS問題を回避
    const res = await fetch("https://anilist.vercel.app/api/graphql", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query, variables }),
    });

    const json = await res.json();

    const media = json.data.Page.media[0];
    if (!media) {
      ul.innerHTML = "<li>アニメが見つかりませんでした</li>";
      return;
    }

    const items = media.characters.edges.map(edge => `
      <li class="character-card">
        ${edge.node.name.full}（CV ${edge.voiceActors[0]?.name.full || "不明"}）
      </li>
    `).join("");

    ul.innerHTML = items;

  } catch (err) {
    console.error(err);
    ul.innerHTML = "<li>データ取得中にエラーが発生しました</li>";
  }
});
</script>
</body>
</html>
